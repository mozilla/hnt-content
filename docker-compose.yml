# Local development only. Runs the Pub/Sub emulator so a service can
# be started against it without touching real GCP. Not used by the
# test suite, which starts its own emulator via testcontainers.
#
#   docker compose up -d
#   PUBSUB_EMULATOR_HOST=localhost:8085 PROJECT_ID=local \
#     ZYTE_API_KEY=<key> pnpm --filter crawl-worker dev
#
# The emulator starts empty, so create the crawl-article subscription
# and articles topic first (e.g. with @google-cloud/pubsub or gcloud).
# Redis backs the worker and agent dedup state (REDIS_HOST=localhost).
services:
  pubsub-emulator:
    image: gcr.io/google.com/cloudsdktool/google-cloud-cli:568.0.0-emulators
    command:
      - gcloud
      - beta
      - emulators
      - pubsub
      - start
      - --host-port=0.0.0.0:8085
      - --project=local
    ports:
      - '8085:8085'

  redis:
    image: redis:7.4.1-alpine
    ports:
      - '6379:6379'

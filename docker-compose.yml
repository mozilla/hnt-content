# Local development only. Runs the Pub/Sub emulator so a service can
# be started against it without touching real GCP. Not used by the
# test suite, which starts its own emulator via testcontainers.
#
#   docker compose up -d
#   PUBSUB_EMULATOR_HOST=localhost:8085 PROJECT_ID=local \
#     pnpm --filter crawl-worker dev
#
# Redis is added in Milestone 8 when the worker starts using it.
services:
  pubsub-emulator:
    image: gcr.io/google.com/cloudsdktool/google-cloud-cli:568.0.0-emulators
    command:
      - gcloud
      - beta
      - emulators
      - pubsub
      - start
      - --host-port=0.0.0.0:8085
      - --project=local
    ports:
      - '8085:8085'
